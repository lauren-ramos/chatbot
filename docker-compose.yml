services:
  waha:
    image: devlikeapro/waha
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      WAHA_LOCAL_STORE_BASE_DIR: /app/.sessions
      WAHA_AUTO_START_DELAY_SECONDS: "5"
      WAHA_WORKER_RESTART_SESSIONS: "True"
      WHATSAPP_RESTART_ALL_SESSIONS: "True"
      WAHA_PRINT_QR: "True"
      WAHA_NAMESPACE: all
      WAHA_CLIENT_DEVICE_NAME: Chatbot
      WAHA_CLIENT_BROWSER_NAME: Chrome
    volumes:
      - ./.sessions-waha:/app/.sessions
